<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900 overflow-x-hidden">

    <div class="flex flex-col min-h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between">
                <div class="flex items-center">
                    <button class="text-gray-600 hover:text-gray-900 focus:outline-none p-2 transition-colors">
                        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <div class="h-8 border-l border-green-300 mx-4"></div>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-center justify-center py-12">
            <div class="w-full max-w-sm bg-white p-8 rounded-lg shadow-sm border border-gray-200">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Reset Password</h1>
                    <p class="text-sm text-gray-600">Enter your email address and we'll send you a recovery code.</p>
                </div>

                <form id="forgotForm" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600 mb-1">Email</label>
                        <input type="email" id="forgotEmail" required placeholder="FridgeWise@gmail.com" class="w-full border border-gray-400 bg-white p-3 outline-none focus:border-blue-500">
                        <p id="errorMsg" class="text-[10px] font-bold text-red-500 mt-2"></p>
                    </div>

                    <button type="submit" class="w-full bg-[#2b87da] text-white font-bold py-3 uppercase tracking-widest hover:bg-blue-600 transition-colors shadow-md">
                        SUBMIT EMAIL
                    </button>

                    <div class="text-center">
                        <a href="login.html" class="text-xs font-bold text-gray-500 hover:underline">Back to Login</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        emailjs.init("DcrQMridVUedYQcbl"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('forgotEmail');
        const errorMsg = document.getElementById('errorMsg');
        const btn = form.querySelector('button');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            errorMsg.innerText = "";

            auth.fetchSignInMethodsForEmail(email).then(methods => {
                if (methods.length === 0) {
                    errorMsg.innerText = "The input email is not found";
                    emailInput.style.borderColor = "red";
                } else {
                    sendResetCode(email);
                }
            }).catch(err => {
                console.error(err);
                alert("Error checking database.");
            });
        });

        function sendResetCode(email) {
            const randomCode = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('resetCode', randomCode);
            localStorage.setItem('resetEmail', email); // CRITICAL: Save email for later
            
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const templateParams = {
                to_email: email, 
                code: randomCode,
                from_name: "FridgeWise"
            };

            emailjs.send('service_s9ai3m3', 'template_agosrx7', templateParams)
                .then(function() {
                    window.location.href = "forgotpassword2.html";
                }, function(error) {
                    alert("Failed to send email.");
                    btn.innerText = "SUBMIT EMAIL";
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
