<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; }
        @keyframes shake {
            0% { margin-left: 0rem; }
            25% { margin-left: 0.5rem; }
            75% { margin-left: -0.5rem; }
            100% { margin-left: 0rem; }
        }
    </style>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900 overflow-x-hidden">

    <div class="flex flex-col min-h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between">
                <div class="flex items-center">
                    <a href="index.html" class="text-gray-600 hover:text-gray-900 focus:outline-none p-2 transition-colors">
                        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                    </a>
                    <div class="h-8 border-l border-green-300 mx-4"></div>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-center justify-center py-12">
            <div id="loginCard" class="w-full max-w-md px-6">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-bold text-gray-800 mb-2">Welcome Back</h1>
                    <p class="text-lg text-gray-700">Don't have an account? <a href="register.html" class="underline hover:text-black">Register</a></p>
                </div>

                <form id="loginForm" class="space-y-6 bg-white p-8 rounded-lg shadow-sm border border-gray-200">
                    <div>
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600 mb-1">Email</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email" 
                            class="w-full border border-gray-400 bg-white p-3 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600">Password</label>
                        </div>
                        <input type="password" id="loginPass" required placeholder="******" 
                            class="w-full border border-gray-400 bg-white p-3 outline-none focus:border-blue-500 transition-all">
                        <p id="errorMessage" class="text-[10px] font-bold text-red-500 mt-2 hidden">Email or Password does not match.</p>
                    </div>

                    <div class="pt-2">
                        <button type="submit" id="loginBtn" class="w-full bg-[#2b87da] text-white font-bold py-3 uppercase tracking-widest hover:bg-blue-600 transition-colors shadow-md">
                            LOG IN
                        </button>
                    </div>

                    <div class="text-center mt-6">
                        <a href="forgotpassword.html" class="text-xs font-bold text-gray-800 hover:underline lowercase">forgot password?</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        // 1. Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPass = document.getElementById('loginPass');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const loginCard = document.getElementById('loginCard');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const password = loginPass.value;

            // Clear previous errors
            errorMessage.classList.add('hidden');
            loginEmail.style.borderColor = "";
            loginPass.style.borderColor = "";

            loginBtn.innerText = "AUTHENTICATING...";
            loginBtn.disabled = true;

            // 2. Set Persistence to LOCAL then Sign In
            // This ensures the session is saved in the browser even after redirect
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => {
                    return auth.signInWithEmailAndPassword(email, password);
                })
                .then((userCredential) => {
                    // Success! 
                    loginBtn.innerText = "SUCCESS! REDIRECTING...";
                    loginBtn.style.backgroundColor = "#16a34a"; // Green feedback
                    
                    // Give Firebase a moment to store the token before redirecting
                    setTimeout(() => {
                        window.location.href = "index.html?status=verified";
                    }, 800);
                })
                .catch((error) => {
                    // Fail! Handle mismatch
                    console.error("Login Error:", error.code);
                    
                    loginBtn.innerText = "LOG IN";
                    loginBtn.disabled = false;
                    
                    // Show error text and red borders
                    errorMessage.classList.remove('hidden');
                    loginEmail.style.borderColor = "red";
                    loginPass.style.borderColor = "red";
                    
                    // Add a little shake effect for impact
                    loginCard.classList.add('error-shake');
                    setTimeout(() => loginCard.classList.remove('error-shake'), 400);
                });
        });
    </script>
</body>
</html>
