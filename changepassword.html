<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise - Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900">

    <div class="flex flex-col min-h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between">
                <div class="flex items-center">
                    <a href="login.html" class="text-gray-600 hover:text-gray-900 p-2 transition-colors">
                        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </a>
                    <div class="h-8 border-l border-green-300 mx-4"></div>
                    <span class="font-bold text-green-800 text-xl uppercase tracking-tighter">FridgeWise</span>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-center justify-center py-12">
            <div class="w-full max-w-md px-6">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">New Password</h1>
                    <p class="text-sm text-gray-600">Please enter your new secure password below.</p>
                </div>

                <form id="changePassForm" class="space-y-6 bg-white p-8 rounded-lg shadow-sm border border-gray-200">
                    <div>
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600 mb-1">New Password</label>
                        <input type="password" id="newPass" required placeholder="******" 
                            class="w-full border border-gray-400 p-3 outline-none focus:border-blue-500 transition-all">
                        <p id="passError" class="text-[10px] text-red-500 mt-1 hidden font-bold uppercase">Password must be at least 6 characters.</p>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600 mb-1">Confirm Password</label>
                        <input type="password" id="confirmPass" required placeholder="******" 
                            class="w-full border border-gray-400 p-3 outline-none focus:border-blue-500 transition-all">
                        <p id="matchError" class="text-[10px] text-red-500 mt-1 hidden font-bold uppercase">Passwords do not match.</p>
                    </div>

                    <div class="pt-2">
                        <button type="submit" id="submitBtn" class="w-full bg-[#2b87da] text-white font-bold py-3 uppercase tracking-widest hover:bg-blue-600 transition-colors shadow-md">
                            UPDATE PASSWORD
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const form = document.getElementById('changePassForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const email = localStorage.getItem('resetEmail');

            // Reset errors
            document.getElementById('passError').classList.add('hidden');
            document.getElementById('matchError').classList.add('hidden');

            // Validations
            if (newPass.length < 6) {
                document.getElementById('passError').classList.remove('hidden');
                return;
            }
            if (newPass !== confirmPass) {
                document.getElementById('matchError').classList.remove('hidden');
                return;
            }
            if (!email) {
                alert("Session expired. Please restart the process.");
                window.location.href = "forgotpassword.html";
                return;
            }

            submitBtn.innerText = "SYNCING WITH DATABASE...";
            submitBtn.disabled = true;

            try {
                // 2. Fetch User from Database to get the OLD password
                const snapshot = await db.ref('users').orderByChild('email').equalTo(email).once('value');
                
                if (!snapshot.exists()) {
                    throw new Error("No user record found in Database.");
                }

                const userData = snapshot.val();
                const userKey = Object.keys(userData)[0];
                const oldPassInDb = userData[userKey].pass;

                // 3. Re-authenticate silently to allow password change
                // If this fails (auth/wrong-password), your DB 'pass' field doesn't match the actual password
                try {
                    await auth.signInWithEmailAndPassword(email, oldPassInDb);
                } catch (authErr) {
                    console.error("Auth mismatch:", authErr);
                    throw new Error("Security mismatch: The stored password does not match the login system. Please contact support.");
                }

                // 4. Update Firebase Auth (The real login password)
                await auth.currentUser.updatePassword(newPass);

                // 5. Update Realtime Database (The Path B 'pass' field)
                await db.ref('users/' + userKey).update({
                    pass: newPass
                });

                alert("Password successfully updated!");
                
                // 6. Cleanup and Redirect
                localStorage.clear();
                await auth.signOut();
                window.location.href = "login.html";

            } catch (error) {
                console.error("Change Password Error:", error);
                alert("Error: " + error.message);
                submitBtn.innerText = "UPDATE PASSWORD";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
