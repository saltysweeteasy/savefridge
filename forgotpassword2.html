<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise - Verify Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900 overflow-x-hidden">

    <div class="flex flex-col min-h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between">
                <div class="flex items-center">
                    <button class="text-gray-600 hover:text-gray-900 focus:outline-none p-2 transition-colors">
                        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <div class="h-8 border-l border-green-300 mx-4"></div>
                    <span class="font-bold text-green-800 text-xl uppercase tracking-tighter">FridgeWise</span>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-center justify-center py-12">
            <div class="w-full max-w-sm bg-white p-8 rounded-lg shadow-sm border border-gray-200">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Verify Code</h1>
                    <p class="text-sm text-gray-600">We sent the code to your email, input the code below.</p>
                </div>

                <form id="verifyForm" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600 mb-1">Verification Code</label>
                        <input type="text" id="codeInput" required placeholder="CODE" 
                               maxlength="6" 
                               class="w-full border border-gray-400 bg-white p-3 outline-none focus:border-blue-500 text-center tracking-[0.5em] font-bold uppercase">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-[#2b87da] text-white font-bold py-3 uppercase tracking-widest hover:bg-blue-600 transition-colors shadow-md">
                        SUBMIT CODE
                    </button>

                    <div class="text-center space-y-2">
                        <p class="text-[10px] text-gray-400">Didn't receive a code? <a href="forgotpassword.html" class="underline hover:text-gray-600">Resend</a></p>
                        <a href="forgotpassword.html" class="block text-xs font-bold text-gray-500 hover:underline">Change Email</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('verifyForm');
        const codeInput = document.getElementById('codeInput');
        const submitBtn = document.getElementById('submitBtn');

        // Security Check: If there is no email in storage, they shouldn't be here
        window.onload = function() {
            const resetEmail = localStorage.getItem('resetEmail');
            if (!resetEmail) {
                alert("No reset session found. Please enter your email again.");
                window.location.href = "forgotpassword.html";
            }
        };

        // Ensure only numbers are typed
        codeInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const sentCode = localStorage.getItem('resetCode');
            const userCode = codeInput.value.trim();

            if (!sentCode) {
                alert("Verification session expired. Please resend the code.");
                window.location.href = "forgotpassword.html";
                return;
            }

            if (userCode === sentCode.toString()) {
                // Correct code!
                submitBtn.innerText = "VERIFIED!";
                submitBtn.style.backgroundColor = "#16a34a"; // Green feedback
                
                // We DON'T remove resetEmail yet (changepassword.html needs it)
                // We only remove the code
                localStorage.removeItem('resetCode');
                
                setTimeout(() => {
                    window.location.href = "changepassword.html";
                }, 800);
            } else {
                alert("The code you entered is incorrect. Please try again.");
                codeInput.value = "";
                codeInput.focus();
            }
        });
    </script>
</body>
</html>
